<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/flo-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Flo — track your income and expenses with clarity. A personal budget tracker designed for real people."
    />
    <meta name="theme-color" content="#0c0c0f" />
    <title>Flo — Personal Budget Tracker</title>
    <!-- Anti-flash: apply theme class before React mounts -->
    <script>
      (function () {
        var t = localStorage.getItem('flo-theme');
        if (t === 'light') document.documentElement.classList.add('light');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
